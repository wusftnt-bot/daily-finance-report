name: Publish Daily Finance Report

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-daily-finance-report.yml"
      - "assets/**"
      - "scripts/**"
  schedule:
    # GitHub Actions schedule is UTC. Taipei is UTC+8.
    # 22:30/22:45/22:58 UTC = 06:30/06:45/06:58 Taipei.
    - cron: "30 22 * * *"
    - cron: "45 22 * * *"
    - cron: "58 22 * * *"
    # Backup schedules for the observed GitHub schedule offset. If these run normally, the existing-date guard skips them.
    - cron: "30 3 * * *"
    - cron: "45 3 * * *"
    - cron: "58 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-daily-finance-report
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout daily finance report site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check existing daily report
        id: existing_report
        working-directory: site
        shell: bash
        run: |
          today="$(TZ=Asia/Taipei date +%F)"
          if [[ "${{ github.event_name }}" == "schedule" ]] && grep -q "Daily Finance Report - $today" index.html; then
            echo "Daily finance report for $today already exists. Skipping scheduled fallback run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate daily finance report HTML
        if: steps.existing_report.outputs.skip != 'true'
        working-directory: site
        env:
          TELEGRAM_CHAT_ID: placeholder
          TELEGRAM_FINANCE_BOT_TOKEN: placeholder
          TELEGRAM_FOXCONN_BOT_TOKEN: placeholder
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DAILY_FINANCE_REPORT_DIR: .
        run: python scripts/publish_daily_finance_report.py

      - name: Commit and push report site
        if: steps.existing_report.outputs.skip != 'true'
        working-directory: site
        shell: bash
        run: |
          today="$(TZ=Asia/Taipei date +%F)"
          if git diff --quiet -- index.html; then
            echo "No daily finance report changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update daily finance report $today"
          if git push; then
            exit 0
          fi
          git fetch origin main
          if git show origin/main:index.html | grep -q "Daily Finance Report - $today"; then
            echo "Another scheduled run already published $today. Treating this fallback run as successful."
            exit 0
          fi
          git pull --rebase origin main
          git push
